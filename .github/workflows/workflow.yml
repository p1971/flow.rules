name: flowrules_build

on: [push]

env:
  BuildConfiguration: Release
  NugetPackagePath: $HOME/nuget
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

    - name: Checkout source code
      uses: actions/checkout@v6
      with:
          fetch-depth: 0
          
    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v4.4.2
      with:
          versionSpec: '6.x'

    - name: Determine semantic version
      id: gitversion
      uses: gittools/actions/gitversion/execute@v4.4.2

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4
      with:
          dotnet-version: '10.x'

    - name: dotnet clean
      run: dotnet clean src

    - name: dotnet build
      run: dotnet build src/FlowRules.slnx --configuration ${{ env.BuildConfiguration }} -p:Version=${{ steps.gitversion.outputs.AssemblySemVer }} -p:AssemblyFileVersion=${{ steps.gitversion.outputs.AssemblySemVer }} -p:AssemblyVersion=${{ steps.gitversion.outputs.AssemblySemVer }} -p:AssemblyInformationalVersion=${{ steps.gitversion.outputs.InformationalVersion }}

    - name: dotnet test 
      run: dotnet test src --logger:"trx;LogFileName=TestResults.xml" --filter Category!=Extension --no-build /p:CollectCoverage=true /p:CoverletOutputFormat=opencover --configuration ${{ env.BuildConfiguration }} 

    - name: Resolve package version
      id: package_version
      shell: bash
      run: |
            if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
              version="${{ steps.gitversion.outputs.MajorMinorPatch }}"
            else
              version="${{ steps.gitversion.outputs.FullSemVer }}"
              version="${version%%+*}"
              if [[ "$version" =~ ^([0-9]+\.[0-9]+\.[0-9]+)-([0-9]+)$ ]]; then
                version="${BASH_REMATCH[1]}-ci.${BASH_REMATCH[2]}"
              fi
            fi
            echo "version=$version" >> "$GITHUB_OUTPUT"

    - name: Test Report
      uses: dorny/test-reporter@v1
      if: success() || failure()
      with:
        name: Tests            
        path: ./**/TestResults.xml 
        reporter: dotnet-trx       

    - name: Publish coverage report to codecov.io (UNIT)
      uses: codecov/codecov-action@v4
      with:
        file: coverage.opencover.xml
        directory: src/FlowRules.Engine.UnitTests
        token: ${{ secrets.CODECOV_TOKEN  }}
        flags: unit

    - name: nuget packaging
      run: |
            dotnet pack src/FlowRules.Engine/FlowRules.Engine.csproj --no-build --include-symbols -o ${{ env.NugetPackagePath }} -p:Configuration=${{ env.BuildConfiguration }} -p:PackageVersion=${{ steps.package_version.outputs.version }} -p:SymbolPackageFormat=snupkg
            dotnet pack src/FlowRules.Extensions.SqlServer/FlowRules.Extensions.SqlServer.csproj --no-build --include-symbols -o ${{ env.NugetPackagePath }} -p:Configuration=${{ env.BuildConfiguration }} -p:PackageVersion=${{ steps.package_version.outputs.version }} -p:SymbolPackageFormat=snupkg
            echo "VERSION=${{ steps.package_version.outputs.version }}" >> $GITHUB_ENV
            ls ${{ env.NugetPackagePath }}/*
            echo "${{ steps.package_version.outputs.version }}" > ${{ env.NugetPackagePath }}/version.txt

    - name: Setup nuget.exe
      uses: nuget/setup-nuget@v2
      with:
        nuget-version: latest

    - name: list packages
      run: ls -l /home/runner/nuget

    - name: Upload nuget packages
      uses: actions/upload-artifact@v4
      with:
        name: nuget_packages
        path: /home/runner/nuget

  publish-packages:
    runs-on: ubuntu-latest
    needs: build
    steps:

      - name: download
        uses: actions/download-artifact@v4
        with:
          name: nuget_packages
          path: ./nuget_packages

      - name: Extract version from artifact
        run: |
            ls ./nuget_packages/*
            version=`cat ./nuget_packages/version.txt`
            echo "VERSION=$version" >> $GITHUB_ENV

      - name: Push generated package to GitHub registry
        if: contains(github.ref, 'develop') || contains(github.ref, 'releases') || contains(github.ref, 'feature')
        run: |
          dotnet nuget push ./nuget_packages/*.nupkg --source "https://nuget.pkg.github.com/p1971/index.json" --skip-duplicate --api-key ${{secrets.GITHUB_TOKEN}}          
        shell: bash

      - name: Push generated package to Nuget registry
        if: contains(github.ref, 'main')
        run: |
          dotnet nuget push ./nuget_packages/*.nupkg --source "https://api.nuget.org/v3/index.json" --skip-duplicate --api-key ${{secrets.NUGET_API_KEY}}          
        shell: bash

      - name: Create Release
        if: contains(github.ref, 'main')
        id: create_release
        uses: ncipollo/release-action@v1        
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "./nuget_packages/*"
          tag: ${{ env.VERSION }} 
